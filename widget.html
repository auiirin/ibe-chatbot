<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Chatbot Widget — Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: #f0ede8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  /* ===== DEMO PAGE ===== */
  .demo-note {
    position: fixed;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    background: #1a1a2e;
    color: #eee;
    font-size: 12px;
    padding: 8px 20px;
    border-radius: 20px;
    white-space: nowrap;
    z-index: 10;
    opacity: 0.85;
  }

  /* ===== CHAT BUBBLE BUTTON ===== */
  #chat-toggle {
    position: fixed;
    bottom: 28px; right: 28px;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a3a5c, #2e6da4);
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(26,58,92,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    transition: transform .2s, box-shadow .2s;
    z-index: 1000;
  }

  #chat-toggle:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 28px rgba(26,58,92,0.5);
  }

  /* ===== CHAT WINDOW ===== */
  #chat-window {
    position: fixed;
    bottom: 100px; right: 28px;
    width: 370px;
    max-height: 560px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 999;
    transform: scale(0.9) translateY(20px);
    opacity: 0;
    pointer-events: none;
    transition: transform .25s ease, opacity .25s ease;
  }

  #chat-window.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* Header */
  .chat-header {
    background: linear-gradient(135deg, #1a3a5c, #2e6da4);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .chat-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .chat-header-info { flex: 1; }

  .chat-header-name {
    font-size: 15px; font-weight: 600;
    color: #fff;
  }

  .chat-header-status {
    font-size: 12px;
    color: rgba(255,255,255,0.8);
    display: flex; align-items: center; gap: 5px;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #7eed9e;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .chat-close {
    background: none; border: none;
    color: rgba(255,255,255,0.8);
    font-size: 22px;
    cursor: pointer;
    padding: 2px;
    line-height: 1;
    transition: color .2s;
  }

  .chat-close:hover { color: #fff; }

  /* Messages */
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #f0f4f8;
    min-height: 0;
    max-height: 380px;
    scroll-behavior: smooth;
  }

  #chat-messages::-webkit-scrollbar { width: 4px; }
  #chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

  /* Bubble */
  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
    animation: bubbleIn .2s ease;
  }

  @keyframes bubbleIn {
    from { transform: translateY(6px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  .bubble.bot {
    background: #fff;
    color: #2d2415;
    border-radius: 4px 16px 16px 16px;
    align-self: flex-start;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    border: 1px solid #eee;
  }

  .bubble.user {
    background: linear-gradient(135deg, #1a3a5c, #2e6da4);
    color: #fff;
    border-radius: 16px 4px 16px 16px;
    align-self: flex-end;
  }

  /* Bot row with avatar */
  .bot-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    align-self: flex-start;
    max-width: 88%;
  }

  .bot-mini-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a3a5c, #2e6da4);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex; gap: 4px;
    align-items: center;
    padding: 10px 14px;
  }

  .typing-indicator span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #2e6da4;
    animation: typing 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: .2s; }
  .typing-indicator span:nth-child(3) { animation-delay: .4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: .6; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* Quick replies */
  .quick-replies {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 4px 0 4px 34px;
    align-self: flex-start;
    width: 100%;
  }

  .qr-btn {
    background: #fff;
    border: 1px solid #2e6da4;
    color: #1a3a5c;
    font-family: 'Sarabun', sans-serif;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }

  .qr-btn:hover {
    background: #2e6da4;
    color: #fff;
  }

  /* Input area */
  .chat-input-area {
    padding: 12px 14px;
    border-top: 1px solid #eee;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: #fff;
    flex-shrink: 0;
  }

  #chat-input {
    flex: 1;
    border: 1px solid #ddd;
    border-radius: 22px;
    padding: 10px 16px;
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 100px;
    overflow-y: auto;
    line-height: 1.4;
    transition: border-color .2s;
    background: #f0f4f8;
  }

  #chat-input:focus { border-color: #c9a96e; }
  #chat-input::placeholder { color: #bbb; }

  #send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a3a5c, #2e6da4);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform .15s, opacity .2s;
  }

  #send-btn:hover { transform: scale(1.07); }
  #send-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

  #send-btn svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; }

  /* Mobile */
  @media (max-width: 420px) {
    #chat-window { width: calc(100vw - 32px); right: 16px; bottom: 90px; }
    #chat-toggle { right: 16px; bottom: 16px; }
  }
</style>
</head>
<body>

<p class="demo-note">🏨 Hotel Chatbot Widget Demo — เชื่อมต่อ Backend ก่อนใช้งานจริง</p>

<!-- Chat Toggle Button -->
<button id="chat-toggle" onclick="toggleChat()" title="คุยกับน้อง SORA">
  💬
</button>

<!-- Chat Window -->
<div id="chat-window">
  <div class="chat-header">
    <div class="chat-avatar">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="10" r="5" fill="rgba(255,255,255,0.9)"/>
        <path d="M4 24c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
        <circle cx="9" cy="10" r="1.2" fill="#2e6da4"/>
        <circle cx="19" cy="10" r="1.2" fill="#2e6da4"/>
        <path d="M11 13c.8.8 2 1.2 3 1.2s2.2-.4 3-1.2" stroke="#2e6da4" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="22" cy="6" r="3" fill="rgba(255,255,255,0.3)"/>
        <text x="22" y="8" text-anchor="middle" font-size="4" fill="white">AI</text>
      </svg>
    </div>
    <div class="chat-header-info">
      <div class="chat-header-name">น้อง SORA</div>
      <div class="chat-header-status">
        <div class="status-dot"></div>
        AI Assistant · พร้อมให้บริการ
      </div>
    </div>
    <button class="chat-close" onclick="toggleChat()">✕</button>
  </div>

  <div id="chat-messages"></div>

  <div class="chat-input-area">
    <textarea
      id="chat-input"
      rows="1"
      placeholder="พิมพ์คำถามได้เลยครับ..."
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()" title="ส่ง">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
  // ======================================
  // Config — เปลี่ยน URL ให้ตรงกับ backend
  // ======================================
  const API_URL = 'https://ibe-chatbot-production.up.railway.app/api/chat'

  let chatOpen = false
  let chatHistory = []
  let isLoading = false

  const QUICK_REPLIES = [
    '🛏 ดูห้องพักและราคา',
    '🏊 บริการในโรงแรม',
    '🎁 โปรโมชันตอนนี้',
    '🕐 เช็คอิน-เอาท์ กี่โมง?',
    '🚗 มีรับส่งสนามบินไหม?',
  ]

  // ======================================
  // Toggle chat window
  // ======================================
  function toggleChat() {
    chatOpen = !chatOpen
    const win = document.getElementById('chat-window')
    const btn = document.getElementById('chat-toggle')
    win.classList.toggle('open', chatOpen)
    btn.innerHTML = chatOpen ? '✕' : `<svg width='26' height='26' viewBox='0 0 28 28' fill='none'><circle cx='14' cy='10' r='5' fill='white'/><path d='M4 24c0-5.523 4.477-10 10-10s10 4.477 10 10' stroke='white' stroke-width='2.5' stroke-linecap='round'/></svg>`

    if (chatOpen && chatHistory.length === 0) {
      showWelcome()
    }
  }

  // ======================================
  // Welcome message
  // ======================================
  function showWelcome() {
    addBotMessage('สวัสดีครับ 🙏 ผมน้อง SORA AI Assistant ของโรงแรม\nยินดีให้บริการข้อมูลห้องพัก บริการ และโปรโมชันครับ')
    showQuickReplies()
  }

  // ======================================
  // Add messages to UI
  // ======================================
  function addUserMessage(text) {
    const msgs = document.getElementById('chat-messages')
    const div = document.createElement('div')
    div.className = 'bubble user'
    div.textContent = text
    msgs.appendChild(div)
    scrollBottom()
  }

  function addBotMessage(text) {
    const msgs = document.getElementById('chat-messages')
    const row = document.createElement('div')
    row.className = 'bot-row'

    const avatar = document.createElement('div')
    avatar.className = 'bot-mini-avatar'
    avatar.innerHTML = `<svg width='16' height='16' viewBox='0 0 28 28' fill='none'><circle cx='14' cy='10' r='5' fill='white'/><path d='M4 24c0-5.523 4.477-10 10-10s10 4.477 10 10' stroke='white' stroke-width='2.5' stroke-linecap='round'/></svg>`

    const bubble = document.createElement('div')
    bubble.className = 'bubble bot'
    bubble.style.whiteSpace = 'pre-wrap'
    bubble.textContent = text

    row.appendChild(avatar)
    row.appendChild(bubble)
    msgs.appendChild(row)
    scrollBottom()
  }

  function showQuickReplies() {
    const msgs = document.getElementById('chat-messages')
    const div = document.createElement('div')
    div.className = 'quick-replies'
    div.id = 'quick-replies'

    QUICK_REPLIES.forEach(qr => {
      const btn = document.createElement('button')
      btn.className = 'qr-btn'
      btn.textContent = qr
      btn.onclick = () => {
        document.getElementById('quick-replies')?.remove()
        sendMessage(qr)
      }
      div.appendChild(btn)
    })

    msgs.appendChild(div)
    scrollBottom()
  }

  function showTyping() {
    const msgs = document.getElementById('chat-messages')
    const row = document.createElement('div')
    row.className = 'bot-row'
    row.id = 'typing-row'

    const avatar = document.createElement('div')
    avatar.className = 'bot-mini-avatar'
    avatar.innerHTML = `<svg width='16' height='16' viewBox='0 0 28 28' fill='none'><circle cx='14' cy='10' r='5' fill='white'/><path d='M4 24c0-5.523 4.477-10 10-10s10 4.477 10 10' stroke='white' stroke-width='2.5' stroke-linecap='round'/></svg>`

    const bubble = document.createElement('div')
    bubble.className = 'bubble bot'
    bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`

    row.appendChild(avatar)
    row.appendChild(bubble)
    msgs.appendChild(row)
    scrollBottom()
  }

  function hideTyping() {
    document.getElementById('typing-row')?.remove()
  }

  function scrollBottom() {
    const msgs = document.getElementById('chat-messages')
    msgs.scrollTop = msgs.scrollHeight
  }

  // ======================================
  // Send message
  // ======================================
  async function sendMessage(text) {
    const input = document.getElementById('chat-input')
    const msg = text || input.value.trim()

    if (!msg || isLoading) return

    isLoading = true
    input.value = ''
    autoResize(input)
    document.getElementById('send-btn').disabled = true
    document.getElementById('quick-replies')?.remove()

    addUserMessage(msg)
    chatHistory.push({ role: 'user', content: msg })

    showTyping()

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, history: chatHistory.slice(-10) })
      })

      const data = await res.json()
      hideTyping()

      if (data.reply) {
        addBotMessage(data.reply)
        chatHistory.push({ role: 'assistant', content: data.reply })
      } else {
        addBotMessage('ขออภัยครับ เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง')
      }
    } catch (err) {
      hideTyping()
      addBotMessage('ไม่สามารถเชื่อมต่อได้ครับ กรุณาตรวจสอบการเชื่อมต่อ')
    }

    isLoading = false
    document.getElementById('send-btn').disabled = false
    input.focus()
  }

  // ======================================
  // Helpers
  // ======================================
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      sendMessage()
    }
  }

  function autoResize(el) {
    el.style.height = 'auto'
    el.style.height = Math.min(el.scrollHeight, 100) + 'px'
  }
</script>

</body>
</html>
